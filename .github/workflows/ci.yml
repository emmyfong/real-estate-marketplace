name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # DynamoDB Local for the integration tests. The default image command
      # listens on 8000; the integration tests provision their own isolated
      # table, so no seeding step is needed here.
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Pure unit tests (geo math, filters, seed data) — no database needed.
      - name: Unit tests
        run: npm test

      # Integration tests exercise the real data layer and router against the
      # DynamoDB Local service container above.
      - name: Integration tests
        run: npm run test:integration
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
